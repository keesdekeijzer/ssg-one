{% extends "base.html" %}

{% block content %}
  <h1>{{ title }}</h1>
  <p><small>{{ date }}</small></p>

  <div>{{ content | safe }}</div>

  {% if tags %}
    <p>Tags: 
      {% for tag in tags %}
        <a href="/tags/{{ tag }}">{{ tag }}</a>{% if not loop.last %}, {% endif %}     
      {% endfor %}
    </p>
  {% endif %}
{% endblock %}
