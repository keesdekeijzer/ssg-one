{% extends "base.html" %}

{% block content %}

  {% if post.hero %}
  <div>
    <img src="{{ post.hero }}" alt="{{ post.title }}">
    <picture>
      <source type="image/webp"
      srcset="
      {{ post.images.medium.webp }} 600w,
      {{ post.images.large.webp }} 1200w
      "
      sizes="100vw">

      <source type="image/jpeg"
      srcset="
      {{ post.images.medium.jpg }} 600w,
      {{ post.images.large.jpg }} 1200w
      "
      sizes="100vw">

      <img class="hero" src="{{ post.images.medium.jpg }}" alt="{{ post.title }}" loading="lazy">

    </picture>
  </div>
  {% endif %}


  <h1>{{ title }}</h1>
  <p class="post-date">{{ date }}</p>

  <div class="post-content">{{ content | safe }}</div>

  {% if tags %}
    <p class="tags">Tags: 
      {% for tag in tags %}
        <a href="/tags/{{ tag }}">{{ tag }}</a>{% if not loop.last %}, {% endif %}     
      {% endfor %}
    </p>
  {% endif %}
{% endblock %}
