{% extends "base.html" %}

{% block content %}
  <h1>{{ title }}</h1>
  <p class="post-date">{{ date }}</p>

  <div class="post-content">{{ content | safe }}</div>

  {% if tags %}
    <p class="tags">Tags: 
      {% for tag in tags %}
        <a href="/tags/{{ tag }}">{{ tag }}</a>{% if not loop.last %}, {% endif %}     
      {% endfor %}
    </p>
  {% endif %}
{% endblock %}
