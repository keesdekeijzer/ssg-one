<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn tweede post - Mijn blog</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/lightbox.js"></script>
</head>
<body>
    <header>
    <h1>Mijn blog</h1>
    <nav>
        <ul>
            
            <li><a href="/">Home</a></li>
            
            <li><a href="/">Blog</a></li>
            
            <li><a href="/about/">Over</a></li>
            
        </ul>
    </nav>
    </header>
    <main>
        

  
  <div>
    
    <picture>
      <source type="image/webp"
      srcset="
      /static/thumbs/tweede-post-medium.webp 600w,
      /static/thumbs/tweede-post-large.webp 1200w
      "
      sizes="100vw">

      <source type="image/jpeg"
      srcset="
      /static/thumbs/tweede-post-medium.jpg 600w,
      /static/thumbs/tweede-post-large.jpg 1200w
      "
      sizes="100vw">

      <img class="hero" src="/static/thumbs/tweede-post-medium.jpg" alt="Mijn tweede post" loading="lazy">

    </picture>
  </div>
  

  

  <h1>Mijn tweede post</h1>
  <p class="post-date">2026-03-18</p>

  <div class="post-content"><p>Welkom bij mijn tweede blogpost. Dit is <strong>Markdown</strong>.</p></div>

  
    <p class="tags">Tags: 
      
        <a href="/tags/python">python</a>,      
      
        <a href="/tags/post">post</a>     
      
    </p>
  



        
    </main>
    <footer>
        <p>&copy; Mijn blog - Welkom op mijn persoonlijke blog.</p>
    </footer>

    <div id="lightbox" class="lightbox hidden">
        <button class="lightbox-close"></button>
        <button class="lightbox-prev"></button>
        <button class="lightbox-next"></button>
        <div class="lightbox-content"></div>

        <div class="lightbox-overlay hidden">
            <span>&ltlarr; / &gtrarr; bladeren</span>
            <span>Esc sluiten</span>
            <span>Spatie volgende</span>
        </div>

        <div class="lightbox-touch-overlay hidden">
            <span>Swipe links/rechts om te bladeren</span>
            <span>Tik om te sluiten</span>
        </div>
    </div>

</body>
</html>
