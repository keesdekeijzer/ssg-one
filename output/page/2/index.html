<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Pagina 2 - Mijn blog</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/lightbox.js"></script>
</head>
<body>
    <header>
    <h1>Mijn blog</h1>
    <nav>
        <ul>
            
            <li><a href="/">Home</a></li>
            
            <li><a href="/">Blog</a></li>
            
            <li><a href="/about/">Over</a></li>
            
        </ul>
    </nav>
    </header>
    <main>
        
<h1>Blog</h1>

<ul class="post-list">
    

    <article class="post-card">

        
        <a href="">
            <picture>
                <source type="image/webp"
                srcset="
                /static/thumbs/vierde-post-small.webp 300w,
                /static/thumbs/vierde-post-medium.webp 600w
                "
                sizes="(max-width: 600px) 100vw, 300px">

                <source type="image/jpeg"
                srcset="
                /static/thumbs/vierde-post-small.jpg 300w,
                /static/thumbs/vierde-post-medium.jpg 600w
                "
                sizes="(max-width: 600px) 100vw, 300px">

                <img class="thumb" src="/static/thumbs/vierde-post-medium.jpg" alt="Mijn vierde post" loading="lazy">
            </picture>
        </a>
        

    
    <h2>
        <a href="/posts/vierde-post/">Mijn vierde post</a>
    </h2>
    <p></p>
        <p><small>2026-03-18</small></p>
    
    </article>
    

    <article class="post-card">

        
        <a href="">
            <picture>
                <source type="image/webp"
                srcset="
                /static/thumbs/twaalfde-post-small.webp 300w,
                /static/thumbs/twaalfde-post-medium.webp 600w
                "
                sizes="(max-width: 600px) 100vw, 300px">

                <source type="image/jpeg"
                srcset="
                /static/thumbs/twaalfde-post-small.jpg 300w,
                /static/thumbs/twaalfde-post-medium.jpg 600w
                "
                sizes="(max-width: 600px) 100vw, 300px">

                <img class="thumb" src="/static/thumbs/twaalfde-post-medium.jpg" alt="Mijn twaalfde post" loading="lazy">
            </picture>
        </a>
        

    
    <h2>
        <a href="/posts/twaalfde-post/">Mijn twaalfde post</a>
    </h2>
    <p></p>
        <p><small>2026-03-18</small></p>
    
    </article>
    
</ul>


<div class="pagination">
    
    <a href="/">Vorige</a>
    


    <span>Pagina 2 van 2</span>
    
</div>


        
    </main>
    <footer>
        <p>&copy; Mijn blog - Welkom op mijn persoonlijke blog.</p>
    </footer>

    <div id="lightbox" class="lightbox hidden">
        <button class="lightbox-close"></button>
        <button class="lightbox-prev"></button>
        <button class="lightbox-next"></button>
        <div class="lightbox-content"></div>

        <div class="lightbox-overlay hidden">
            <span>&ltlarr; / &gtrarr; bladeren</span>
            <span>Esc sluiten</span>
            <span>Spatie volgende</span>
        </div>

        <div class="lightbox-touch-overlay hidden">
            <span>Swipe links/rechts om te bladeren</span>
            <span>Tik om te sluiten</span>
        </div>
    </div>

</body>
</html>
