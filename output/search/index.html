<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Mijn blog</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="/static/prism.css" rel="stylesheet" />
    <script src="/static/lightbox.js"></script>
</head>
<body>
    <header>
    <h1>Mijn blog</h1>
    <nav>
        <ul>
            
            <li><a href="/">Home</a></li>
            
            <li><a href="/blog/">Blog</a></li>
            
            <li><a href="/about/">Over</a></li>
            
            <li><a href="/search/">Search</a></li>
            
        </ul>
    </nav>
    </header>
    <main>
        
<h2>Zoeken</h2>

<form id="searchForm" action="../search/index.html" method="get">
<input type="search" id="searchbar" placeholder="Wat zoek je?" aria-label="Search"><br>
<button type="submit" class="btn btn-primary">Zoeken</button>
</form>

<div id="listing"></div> <!-- results will be displayed here -->

<script src="search.js"></script>

        
    </main>
    <footer>
        <div class="menu-footer">
        <ul>
            
            <li><a href="/privacy/">Privacybeleid</a></li>
            
            <li><a href="/contact/">Contact</a></li>
            
            <li><a href="/feed.xml">RSS</a></li>
            
            <li><a href="/sitemap.xml">Sitemap</a></li>
            
            <li><a href="https://github.com">GitHub</a></li>
            
        </ul>
    </div>
        <p>&copy; <script>document.write(/\d{4}/.exec(Date())[0])</script> Mijn blog - Welkom op mijn persoonlijke blog.</p>
    </footer>

    <div id="lightbox" class="lightbox hidden">
        <button class="lightbox-close"></button>
        <button class="lightbox-prev"></button>
        <button class="lightbox-next"></button>
        <div class="lightbox-content"></div>

        <div class="lightbox-overlay hidden">
            <span>&ltlarr; / &gtrarr; bladeren</span>
            <span>Esc sluiten</span>
            <span>Spatie volgende</span>
        </div>

        <div class="lightbox-touch-overlay hidden">
            <span>Swipe links/rechts om te bladeren</span>
            <span>Tik om te sluiten</span>
        </div>
    </div>
<script src="/static/prism.js"></script>
</body>
</html>
